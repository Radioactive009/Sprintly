services:
  postgres:
    image: postgres:16

    container_name: sprintly-db

    restart: always

    environment:
      POSTGRES_USER: sprintly
      POSTGRES_PASSWORD: sprintly123
      POSTGRES_DB: sprintly

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: